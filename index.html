<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Viagem para Disney</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(#001d3d,#003566,#001d3d);
color:white;
text-align:center;
overflow:hidden;
}

h1{
margin-top:20px;
font-size:38px;
}

.sub{
opacity:0.8;
margin-bottom:20px;
}

.castelo{
font-size:70px;
animation:flutuar 4s ease-in-out infinite;
}

@keyframes flutuar{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

.contador{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:20px;
}

.box{
background:rgba(255,255,255,0.15);
padding:20px;
border-radius:18px;
width:100px;
backdrop-filter:blur(10px);
box-shadow:0 0 15px rgba(0,0,0,0.5);
}

.numero{
font-size:34px;
font-weight:bold;
}

.label{
font-size:14px;
opacity:0.8;
}

#mensagem{
margin-top:20px;
font-size:24px;
color:#ffd60a;
font-weight:bold;
}

.estrelas{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:piscar 2s infinite;
}

@keyframes piscar{
0%{opacity:0.2}
50%{opacity:1}
100%{opacity:0.2}
}

.aviao{
position:absolute;
font-size:40px;
top:75%;
left:-50px;
animation:voar 18s linear infinite;
}

@keyframes voar{
0%{left:-50px}
100%{left:110%}
}

.fogo{
position:absolute;
font-size:30px;
animation:explodir 1.5s ease-out forwards;
}

@keyframes explodir{
0%{transform:scale(0);opacity:1}
100%{transform:scale(3);opacity:0}
}

.checklist{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.4);
padding:15px;
border-radius:10px;
font-size:14px;
}

</style>

</head>

<body>

<h1>🏰 Viagem para Disney</h1>

<div class="castelo">🏰</div>

<div class="sub">Contagem regressiva</div>

<div class="contador">

<div class="box">
<div class="numero" id="dias">0</div>
<div class="label">Dias</div>
</div>

<div class="box">
<div class="numero" id="horas">0</div>
<div class="label">Horas</div>
</div>

<div class="box">
<div class="numero" id="minutos">0</div>
<div class="label">Min</div>
</div>

<div class="box">
<div class="numero" id="segundos">0</div>
<div class="label">Seg</div>
</div>

</div>

<div id="mensagem"></div>

<div class="aviao">✈️</div>

<div class="checklist">

<b>Checklist da viagem</b><br>
☐ Passaporte<br>
☐ Ingressos Disney<br>
☐ Hotel reservado<br>
☐ Mala pronta<br>

</div>

<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>

let dataAlvo = new Date("April 1, 2026 00:00:00").getTime();

function atualizar(){

let agora = new Date().getTime();
let diferenca = dataAlvo - agora;

if(diferenca <= 0){

document.getElementById("mensagem").innerHTML =
"🎆 Chegou o dia! Boa viagem para Disney! 🏰";

fogos();

return;

}

let dias = Math.floor(diferenca/(1000*60*60*24));
let horas = Math.floor((diferenca%(1000*60*60*24))/(1000*60*60));
let minutos = Math.floor((diferenca%(1000*60*60))/(1000*60));
let segundos = Math.floor((diferenca%(1000*60))/1000);

document.getElementById("dias").innerHTML = dias;
document.getElementById("horas").innerHTML = horas;
document.getElementById("minutos").innerHTML = minutos;
document.getElementById("segundos").innerHTML = segundos;

}

setInterval(atualizar,1000);


for(let i=0;i<150;i++){

let estrela=document.createElement("div");

estrela.className="estrelas";

estrela.style.left=Math.random()*100+"%";
estrela.style.top=Math.random()*100+"%";

estrela.style.animationDuration=(Math.random()*3+1)+"s";

document.body.appendChild(estrela);

}

function fogos(){

setInterval(()=>{

let fogo=document.createElement("div");

fogo.className="fogo";
fogo.innerHTML="🎆";

fogo.style.left=Math.random()*100+"%";
fogo.style.top=Math.random()*60+"%";

document.body.appendChild(fogo);

setTimeout(()=>{

fogo.remove();

},1500);

},350);

}

</script>

</body>
</html>
