<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Disney Trip</title>

<style>

body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, Segoe UI;
background:linear-gradient(#0b2545,#134074,#0b2545);
color:white;
text-align:center;
}

header{
padding:20px;
font-size:26px;
font-weight:bold;
}

.castelo{
font-size:60px;
margin-top:10px;
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

.contador{
display:flex;
justify-content:center;
gap:15px;
margin-top:20px;
flex-wrap:wrap;
}

.box{
background:rgba(255,255,255,0.15);
padding:15px;
border-radius:15px;
width:80px;
}

.numero{
font-size:28px;
font-weight:bold;
}

.label{
font-size:12px;
opacity:0.8;
}

.cards{
display:flex;
flex-direction:column;
gap:12px;
padding:20px;
}

.card{
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:12px;
text-align:left;
}

.titulo{
font-weight:bold;
margin-bottom:5px;
}

.aviao{
font-size:35px;
position:absolute;
left:-50px;
top:60%;
animation:voar 18s linear infinite;
}

@keyframes voar{
0%{left:-50px}
100%{left:110%}
}

footer{
margin-top:20px;
opacity:0.7;
font-size:12px;
}

</style>

</head>

<body>

<header>

🏰 Disney Trip

</header>

<div class="castelo">

🏰

</div>

<div class="contador">

<div class="box">
<div class="numero" id="dias">0</div>
<div class="label">Dias</div>
</div>

<div class="box">
<div class="numero" id="horas">0</div>
<div class="label">Horas</div>
</div>

<div class="box">
<div class="numero" id="min">0</div>
<div class="label">Min</div>
</div>

<div class="box">
<div class="numero" id="seg">0</div>
<div class="label">Seg</div>
</div>

</div>

<div class="cards">

<div class="card">
<div class="titulo">✈️ Voo</div>
Viagem marcada para Orlando
</div>

<div class="card">
<div class="titulo">🎢 Parques</div>
Magic Kingdom<br>
EPCOT<br>
Hollywood Studios<br>
Animal Kingdom
</div>

<div class="card">
<div class="titulo">🧳 Checklist</div>
☐ Passaporte<br>
☐ Ingressos<br>
☐ Hotel<br>
☐ Mala pronta
</div>

</div>

<div class="aviao">✈️</div>

<footer>

Disney Trip App

</footer>

<script>

let alvo = new Date("April 1, 2026 00:00:00").getTime();

function atualizar(){

let agora = new Date().getTime();

let diff = alvo - agora;

let dias = Math.floor(diff/(1000*60*60*24));
let horas = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
let min = Math.floor((diff%(1000*60*60))/(1000*60));
let seg = Math.floor((diff%(1000*60))/1000);

document.getElementById("dias").innerHTML = dias;
document.getElementById("horas").innerHTML = horas;
document.getElementById("min").innerHTML = min;
document.getElementById("seg").innerHTML = seg;

}

setInterval(atualizar,1000);

</script>

</body>

</html>
