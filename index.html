<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Disney Trip</title>

<style>

body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, Segoe UI;
background:linear-gradient(#0a1f44,#123b7a,#0a1f44);
color:white;
text-align:center;
overflow-x:hidden;
}

header{
font-size:28px;
font-weight:bold;
padding:20px;
}

.castelo{
font-size:70px;
animation:flutuar 4s ease-in-out infinite;
}

@keyframes flutuar{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

.contador{
display:flex;
justify-content:center;
gap:15px;
margin-top:20px;
flex-wrap:wrap;
}

.box{
background:rgba(255,255,255,0.15);
padding:18px;
border-radius:16px;
width:80px;
}

.numero{
font-size:30px;
font-weight:bold;
}

.label{
font-size:12px;
opacity:0.8;
}

.cards{
display:flex;
flex-direction:column;
gap:15px;
padding:20px;
}

.card{
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:12px;
text-align:left;
}

.titulo{
font-weight:bold;
margin-bottom:6px;
}

.aviao{
position:absolute;
font-size:40px;
top:55%;
left:-60px;
animation:voar 20s linear infinite;
}

@keyframes voar{
0%{left:-60px}
100%{left:110%}
}

.estrelas{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:piscar 2s infinite;
}

@keyframes piscar{
0%{opacity:0.2}
50%{opacity:1}
100%{opacity:0.2}
}

.checklist input{
margin-right:6px;
}

footer{
margin-top:20px;
opacity:0.6;
font-size:12px;
}

</style>

</head>

<body>

<header>

🏰 Disney Trip

</header>

<div class="castelo">

🏰

</div>

<div class="contador">

<div class="box">
<div class="numero" id="dias">0</div>
<div class="label">Dias</div>
</div>

<div class="box">
<div class="numero" id="horas">0</div>
<div class="label">Horas</div>
</div>

<div class="box">
<div class="numero" id="min">0</div>
<div class="label">Min</div>
</div>

<div class="box">
<div class="numero" id="seg">0</div>
<div class="label">Seg</div>
</div>

</div>

<div class="cards">

<div class="card">

<div class="titulo">✈️ Viagem</div>

Brasil → Orlando

</div>

<div class="card">

<div class="titulo">🎢 Parques</div>

Magic Kingdom<br>
EPCOT<br>
Hollywood Studios<br>
Animal Kingdom

</div>

<div class="card checklist">

<div class="titulo">🧳 Checklist</div>

<label><input type="checkbox">Passaporte</label><br>
<label><input type="checkbox">Ingressos</label><br>
<label><input type="checkbox">Hotel</label><br>
<label><input type="checkbox">Mala pronta</label>

</div>

</div>

<div class="aviao">✈️</div>

<footer>

Disney Trip App

</footer>

<script>

let data = new Date("March 31, 2026 00:00:00").getTime();

function atualizar(){

let agora = new Date().getTime();

let diff = data - agora;

let dias = Math.floor(diff/(1000*60*60*24));
let horas = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
let min = Math.floor((diff%(1000*60*60))/(1000*60));
let seg = Math.floor((diff%(1000*60))/1000);

document.getElementById("dias").innerHTML = dias;
document.getElementById("horas").innerHTML = horas;
document.getElementById("min").innerHTML = min;
document.getElementById("seg").innerHTML = seg;

}

setInterval(atualizar,1000);


for(let i=0;i<120;i++){

let estrela=document.createElement("div");

estrela.className="estrelas";

estrela.style.left=Math.random()*100+"%";
estrela.style.top=Math.random()*100+"%";

estrela.style.animationDuration=(Math.random()*3+1)+"s";

document.body.appendChild(estrela);

}

</script>

</body>

</html>
